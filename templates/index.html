<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Finan-as V2</title>
<style>
body{font-family:Arial;background:#f5f5f5;margin:0;padding:20px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px}
.card{background:white;padding:20px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
.card h3{margin:0 0 10px 0}
.btn{background:#667eea;color:white;padding:10px 20px;border:none;border-radius:5px;cursor:pointer;text-decoration:none;display:inline-block}
.alert{color:red;font-weight:bold}
</style>
</head>
<body>
<div class="header">
<h1>Finan-as V2</h1>
<a href="/logout" class="btn">Sair</a>
</div>

<div class="cards">
{% for cat in categorias %}
<div class="card">
<h3>{{ cat.nome }}</h3>
<p>Definido: R$ {{ "%.2f"|format(cat.definido) }}</p>
<p>Gasto: R$ {{ "%.2f"|format(cat.gasto) }}</p>
<p>Saldo: R$ {{ "%.2f"|format(cat.saldo) }}</p>
{% if cat.estourou %}<p class="alert">ESTOUROU!</p>{% endif %}
<form method="POST" action="/gasto">
<input type="hidden" name="categoria" value="{{ cat.nome }}">
<input type="text" name="valor" placeholder="Valor R$">
<button type="submit">Lançar</button>
</form>
</div>
{% endfor %}
</div>

<a href="/exportar" class="btn">Exportar Excel</a>
<a href="/zerar_mes" class="btn">Zerar Mês</a>
</body>
</html>
