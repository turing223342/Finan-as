<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Finan-as</title>
<style>
body{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
.login-box{background:white;padding:40px;border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,0.3);width:350px}
h2{text-align:center;color:#667eea;margin-bottom:30px}
input{width:100%;padding:12px;margin:10px 0;border:2px solid #ddd;border-radius:8px;box-sizing:border-box}
button{width:100%;padding:12px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border:none;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer}
button:hover{opacity:0.9}
.error{color:red;text-align:center;margin-bottom:15px}
.info{text-align:center;margin-top:20px;font-size:12px;color:#666}
</style>
</head>
<body>
<div class="login-box">
<h2>🔐 Finan-as V2</h2>
{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}{% for category, message in messages %}<div class="error">{{ message }}</div>{% endfor %}{% endif %}{% endwith %}
<form method="POST">
<input type="text" name="usuario" placeholder="Usuário" required>
<input type="password" name="senha" placeholder="Senha" required>
<button type="submit">ENTRAR</button>
</form>
<div class="info">Usuário: admin<br>Senha: 1234</div>
</div>
</body>
</html>
